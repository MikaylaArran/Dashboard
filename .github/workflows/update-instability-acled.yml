name: Update instability index (ACLED)

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Generate instability.json from ACLED
        env:
          ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
        run: python scripts/generate_instability_acled.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instability.json
          git diff --cached --quiet || (git commit -m "Auto-update instability.json (ACLED)" && git push)
