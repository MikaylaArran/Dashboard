name: Update Instability (ACLED)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (change if you want)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate instability.json from ACLED
        env:
          ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
        run: |
          python scripts/generate_instability_acled.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instability.json
          git commit -m "Update instability.json (ACLED)" || echo "No changes to commit"
          git push
