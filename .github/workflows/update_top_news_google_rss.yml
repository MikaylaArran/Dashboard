name: Update Top News (Google News RSS)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate top_news.json from Google News RSS
        env:
          NEWS_CATEGORY: all
        run: |
          python scripts/generate_top_news_google_rss.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/top_news.json
          git commit -m "Update top_news.json (Google News RSS)" || echo "No changes to commit"
          git push
