name: Update top news (NewsData.io)

on:
  schedule:
    - cron: "0 * * * *"   # every hour (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Fetch NewsData.io and write data/top_news.json
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: python scripts/generate_top_news_newsdata.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/top_news.json
          git diff --cached --quiet || (git commit -m "Auto-update top_news.json (NewsData.io)" && git push)

      - name: Show generated file
        run: |
          ls -la data || true
          echo "----- top_news.json -----"
          cat data/top_news.json || true
