name: Update Top News (GDELT)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (change if you want)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate top_news.json from GDELT
        env:
          NEWS_MAX: "20"
          NEWS_QUERY: '(war OR conflict OR election OR "central bank" OR inflation OR AI OR cyber OR climate OR protest)'
        run: |
          python scripts/generate_top_news_gdelt.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/top_news.json
          git commit -m "Update top_news.json (GDELT)" || echo "No changes to commit"
          git push
